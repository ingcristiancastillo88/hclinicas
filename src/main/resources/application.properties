spring.application.name=hclinicas
server.port=8080
server.servlet.context-path=/api
spring.datasource.url=jdbc:postgresql://localhost:5432/hclinicas_db
spring.datasource.username=postgresadmin
spring.datasource.password=postgresadmin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

spring.jackson.time-zone=America/Guayaquil

app.jwt.secret=5A7234753778217A25432A462D4A614E645267556B58703272357538782F413F
app.jwt.expiration=86400000
app.jwt.inactivity-timeout=1800000

app.cors.allowed-origins=http://localhost:4200
logging.level.com.hclinicas=DEBUG
logging.level.org.springframework.security=INFO
